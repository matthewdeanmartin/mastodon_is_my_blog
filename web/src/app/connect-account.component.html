<div
  class="card connect-account-panel"
  style="
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 6px;
    z-index: 50;
    width: 360px;
    max-width: 90vw;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
  "
>
  <div class="row" style="align-items: center; margin-bottom: 12px">
    <h3 style="margin: 0; font-size: 1rem; flex: 1">Connect Account</h3>
    <button class="secondary" style="font-size: 0.8rem; padding: 4px 10px" (click)="close()">
      &times;
    </button>
  </div>

  <div class="row" style="gap: 6px; margin-bottom: 14px">
    <button
      [class.secondary]="mode !== 'oauth'"
      style="flex: 1; font-size: 0.85rem"
      (click)="setMode('oauth')"
    >
      OAuth (recommended)
    </button>
    <button
      [class.secondary]="mode !== 'manual'"
      style="flex: 1; font-size: 0.85rem"
      (click)="setMode('manual')"
    >
      Paste API keys
    </button>
  </div>

  <div style="margin-bottom: 10px">
    <label
      for="connect-base-url"
      style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px"
      >Mastodon instance URL</label
    >
    <input
      id="connect-base-url"
      [(ngModel)]="baseUrl"
      placeholder="https://mastodon.social"
      style="
        width: 100%;
        box-sizing: border-box;
        padding: 6px 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 0.875rem;
      "
    />
  </div>

  @if (mode === 'manual') {
    <div style="margin-bottom: 10px">
      <label
        for="connect-client-id"
        style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px"
        >Client ID</label
      >
      <input
        id="connect-client-id"
        [(ngModel)]="clientId"
        style="
          width: 100%;
          box-sizing: border-box;
          padding: 6px 10px;
          border: 1px solid #d1d5db;
          border-radius: 6px;
          font-size: 0.875rem;
        "
      />
    </div>
    <div style="margin-bottom: 10px">
      <label
        for="connect-client-secret"
        style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px"
        >Client Secret</label
      >
      <input
        id="connect-client-secret"
        [(ngModel)]="clientSecret"
        type="password"
        style="
          width: 100%;
          box-sizing: border-box;
          padding: 6px 10px;
          border: 1px solid #d1d5db;
          border-radius: 6px;
          font-size: 0.875rem;
        "
      />
    </div>
    <div style="margin-bottom: 14px">
      <label
        for="connect-access-token"
        style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px"
        >Access Token</label
      >
      <input
        id="connect-access-token"
        [(ngModel)]="accessToken"
        type="password"
        style="
          width: 100%;
          box-sizing: border-box;
          padding: 6px 10px;
          border: 1px solid #d1d5db;
          border-radius: 6px;
          font-size: 0.875rem;
        "
      />
    </div>
  } @else {
    <div class="muted" style="font-size: 0.8rem; margin-bottom: 14px">
      You'll be redirected to your instance to authorize, then brought back here.
    </div>
  }

  @if (error) {
    <div style="color: #dc2626; margin-bottom: 10px; font-size: 0.85rem">{{ error }}</div>
  }

  <div class="row" style="gap: 8px; justify-content: flex-end">
    <button class="secondary" (click)="close()" [disabled]="submitting">Cancel</button>
    <button (click)="submit()" [disabled]="submitting">
      {{ submitting ? 'Connecting...' : 'Connect' }}
    </button>
  </div>
</div>
