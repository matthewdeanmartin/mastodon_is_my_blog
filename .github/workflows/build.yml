name: Build and Test

on: [ push ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: Install uv
        run: pip install uv

      - name: Install Dependencies
        run: uv sync --all-extras

      - name: Run backend tests
        run: make test-backend

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Lint frontend
        working-directory: web
        run: npm run lint

      - name: Test frontend
        working-directory: web
        run: npm run test:ci -- --no-progress

      - name: Build installed frontend
        working-directory: web
        run: npm run build

      - name: Build static Lite client
        working-directory: web
        run: npm run build:lite:pages

      - name: Verify Lite has no backend dependency
        run: |
          grep -F '<base href="/mastodon_is_my_blog/mimb_lite/">' web/dist/lite/browser/index.html
          if grep -R -E 'localhost:8000|/api/admin' web/dist/lite/browser/*.js; then
            echo 'Lite bundle contains a Python-backend dependency.' >&2
            exit 1
          fi

